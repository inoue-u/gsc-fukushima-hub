<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Global Shapers Community Fukushima Hub</title>

<meta name="description" content="Global Shapers Community Fukushima Hubは世界経済フォーラム（WEF）の若者リーダーネットワークです。">
<meta name="robots" content="index,follow">

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:"Outfit","Noto Sans JP",sans-serif;
background:#0a1628;
color:white;
margin:0;
}

section{
padding:80px 40px;
max-width:1200px;
margin:auto;
}

h1{
font-size:42px;
margin-bottom:10px;
}

.members-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:30px;
margin-top:40px;
}

.member-card{
background:#13233f;
padding:30px;
border-radius:8px;
text-align:center;
cursor:pointer;
transition:0.2s;
}

.member-card:hover{
transform:translateY(-5px);
}

.member-avatar{
width:100px;
height:100px;
border-radius:50%;
overflow:hidden;
margin:auto;
margin-bottom:15px;
}

.member-avatar img{
width:100%;
height:100%;
object-fit:cover;
}

.member-name{
font-size:18px;
font-weight:600;
}

.member-role{
font-size:12px;
color:#00c2ff;
letter-spacing:1px;
margin-top:4px;
}

</style>

</head>

<body>

<section>

<h1>Members</h1>

<div class="members-grid">

<div class="member-card">

<div class="member-avatar">
<img src="images/nomura-rika.jpg">
</div>

<div class="member-name">Rika Nomura</div>
<div class="member-role">Curator</div>

</div>


<div class="member-card">

<div class="member-avatar">
<img src="images/ando-chihiro.jpg">
</div>

<div class="member-name">Chihiro Ando</div>
<div class="member-role">Member</div>

</div>


<div class="member-card">

<div class="member-avatar">
<img src="images/yuta-noji.jpg">
</div>

<div class="member-name">Yuta Noji</div>
<div class="member-role">Member</div>

</div>


<div class="member-card">

<div class="member-avatar">
<img src="images/airi-shirado.jpg">
</div>

<div class="member-name">Airi Shirado</div>
<div class="member-role">Member</div>

</div>



<div class="member-card">

<div class="member-avatar">
<img src="images/kensho-sotome.jpg">
</div>

<div class="member-name">Kensho Sotome</div>
<div class="member-role">Member</div>

</div>


<!-- Yingmei Lin -->

<div class="member-card">

<div class="member-avatar">
<img src="images/yingmei-lin.jpg">
</div>

<div class="member-name">Yingmei Lin</div>
<div class="member-role">Member</div>

</div>

</div>

</section>

</body>
</html>
