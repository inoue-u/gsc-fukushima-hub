<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Global Shapers Community Fukushima Hub</title>

<meta name="description" content="Global Shapers Community Fukushima Hubは世界経済フォーラム（WEF）の若者リーダーネットワークです。">
<meta name="robots" content="index,follow">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:"Outfit","Noto Sans JP",sans-serif;
background:#0a1628;
color:white;
overflow-x:hidden;
}

/* NAV */

nav{
position:fixed;
top:0;
left:0;
right:0;
height:70px;
background:rgba(10,22,40,0.95);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 40px;
z-index:1000;
border-bottom:1px solid rgba(255,255,255,0.08);
}

nav a{
color:white;
text-decoration:none;
font-size:14px;
letter-spacing:1px;
margin-left:30px;
}

/* HERO */

.hero{
padding-top:120px; /* ← NAV被り修正 */
padding-bottom:120px;
padding-left:40px;
padding-right:40px;
max-width:1200px;
margin:auto;
}

.hero h1{
font-family:"Bebas Neue";
font-size:80px;
line-height:0.9;
}

.hero p{
margin-top:20px;
color:#9aa6b8;
max-width:500px;
}

/* MEMBERS */

.members{
padding:80px 40px;
max-width:1200px;
margin:auto;
}

.members-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:30px;
margin-top:40px;
}

.member-card{
background:#13233f;
padding:30px;
border-radius:8px;
cursor:pointer;
transition:0.2s;
}

.member-card:hover{
transform:translateY(-6px);
}

.member-avatar{
width:90px;
height:90px;
border-radius:50%;
overflow:hidden;
margin-bottom:15px;
}

.member-avatar img{
width:100%;
height:100%;
object-fit:cover;
}

.member-name{
font-size:18px;
font-weight:600;
}

.member-role{
font-size:12px;
color:#00c2ff;
margin-top:3px;
letter-spacing:1px;
}

/* MODAL */

.modal{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
display:none;
align-items:center;
justify-content:center;
background:rgba(0,0,0,0.8);
z-index:5000;
}

.modal-content{
background:#0a1628;
padding:40px;
border-radius:10px;
width:400px;
max-width:90%;
}

.modal-avatar{
width:120px;
height:120px;
border-radius:50%;
overflow:hidden;
margin:auto;
}

.modal-avatar img{
width:100%;
height:100%;
object-fit:cover;
}

.modal h2{
text-align:center;
margin-top:15px;
}

.modal p{
text-align:center;
color:#9aa6b8;
margin-top:10px;
}

.close{
position:absolute;
top:20px;
right:30px;
font-size:28px;
cursor:pointer;
}

</style>
</head>

<body>

<nav>

<div>
<strong>GSC Fukushima</strong>
</div>

<div>
<a href="#about">About</a>
<a href="#members">Members</a>
<a href="#contact">Contact</a>
</div>

</nav>

<section class="hero">

<h1>
Global Shapers<br>
Fukushima Hub
</h1>

<p>
Global Shapers Community Fukushima Hubは  
世界経済フォーラム（WEF）が設立した  
若者リーダーネットワークの福島拠点です。
</p>

</section>


<section class="members" id="members">

<h2>Members</h2>

<div class="members-grid">

<div class="member-card" onclick="openModal('yingmei')">

<div class="member-avatar">
<img src="images/yingmei-lin.jpg">
</div>

<div class="member-name">
Yingmei Lin
</div>

<div class="member-role">
Member
</div>

</div>

</div>

</section>


<!-- MODAL -->

<div class="modal" id="yingmei">

<div class="modal-content">

<div class="close" onclick="closeModal()">×</div>

<div class="modal-avatar">
<img src="images/yingmei-lin.jpg">
</div>

<h2>Yingmei Lin</h2>

<p>
Global Shapers Community Fukushima Hub Member
</p>

</div>

</div>


<script>

function openModal(id){

document.getElementById(id).style.display="flex"

}

function closeModal(){

document.querySelectorAll(".modal").forEach(m=>{
m.style.display="none"
})

}

</script>


</body>
</html>
